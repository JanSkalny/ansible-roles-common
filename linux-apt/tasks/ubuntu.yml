# ubuntu 24.04+ uses ubuntu.sources
- block:
    - template:
        src: ubuntu.sources
        dest: "/etc/apt/sources.list.d/ubuntu.sources"
    - copy:
        content: |
          # Ubuntu sources have moved to /etc/apt/sources.list.d/ubuntu.sources
        dest: "/etc/apt/sources.list"
  when: 
    - ansible_distribution_major_version|int >= 24

# ubuntu 22.04- uses sources.list
- block:
    - template:
        src: "Ubuntu.list"
        dest: "/etc/apt/sources.list"
    - file:
        path: "/etc/apt/sources.list.d/ubuntu.sources"
        state: absent
  when: 
    - ansible_distribution_major_version|int < 24

# periodic updates and cleaup on all ubuntus
- template:
    src: "10periodic"
    dest: "/etc/apt/apt.conf.d/10periodic"
- file:
    path: "/etc/apt/{{ item }}"
    state: absent
  with_items:
    - apt.conf.d/20auto-upgrades
