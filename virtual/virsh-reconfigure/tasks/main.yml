- import_role: 
    name: common/virtual/shutdown
  ignore_errors: True

- name: undefine old vm
  virt:
    name: "{{ virtual.name }}"
    command: undefine
  ignore_errors: true

- name: define new vm
  virt:
    command: define
    xml: "{{ lookup('template', '../generate-config/templates/virtual.xml') }}"

- import_role: 
    name: common/virtual/start
