version: 2
ethernets:
  eth0:
     match:
       macaddress: "{{ networking[virtual.default_interface | default('eth0')].ether }}"
     set-name: "{{ virtual.default_interface | default('eth0') }}"
{% if networking[virtual.default_interface | default('eth0')].address == 'dhcp' %}
     dhcp4: true
{% else %}
     dhcp4: false
     addresses:
       - {{ networking[virtual.default_interface | default('eth0')].address }}
{% if networking[virtual.default_interface | default('eth0')].address6 | default(False) %}
       - {{ networking[virtual.default_interface | default('eth0')].address6 }}
{% endif %}
{% if networking[virtual.default_interface | default('eth0')].gateway | default(False) %}
     gateway4: {{ networking[virtual.default_interface | default('eth0')].gateway }}
{% endif %}
{% if networking[virtual.default_interface | default('eth0')].gateway6 | default(False) %}
     gateway6: {{ networking[virtual.default_interface | default('eth0')].gateway6 }}
{% endif %}
     nameservers:
       addresses: {{ dns_servers | default(['1.1.1.1']) }}
{% endif %}
