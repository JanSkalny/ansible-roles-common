# firewall object can be either
# - single IPv4/IPv6 addr or net
# - (mixed) list of IPv4/IPv6 addrs or nets
# - list of exiseting firewall objects and/or IPv4/IPv6 addrs or nets
#firewall_objects__example:
#   PUB: 10.0.0.0/24
#   DMZ:
#     - 10.0.1.0/24
#     - 10.0.2.0/24
#   foo.example.com: 1.1.1.1
#   bar.example.com:
#     - 10.0.1.34
#   EXAMPLE:
#     - foo.example.com
#     - bar.example.com
#   BAZ: 
#     - EXAMPLE
#     - 1.2.3.0/24
#     - 1.1.1.1

# firewall input/output/forward rule can have 
#  - one (str) or more (str[]) source (src) IPv4/IPv6 addresses / nets or named firewall objects
#  - one (str) or more (str[]) destination (dst) IPv4/IPv6 addresses / nets or named firewall objects
#  - optional object with L4 protocol and ports (codes), where 
#    - key is either name or /etc/protocols number
#    - value is either one or more (comma separated) port numbers
#firewall_input__example:
#  - name: ssh from lan
#    src: LAN
#    proto:
#      tcp: 22
#  - name: elastic from DMZ segment
#    src: DMZ
#    dst: 10.10.10.0/24
#    proto: 
#      tcp: 9200, 9300
#      udp: 100:110
#    rule: LOG_ACCEPT

#XXX: re-integrate with "networking" role
firewall_interfaces: {}

# NAT and other final firewall patches via firewall_final_patch. 
# example:
#firewall_final_patch: 
# - "$IT4 -t nat -A POSTROUTING -o eth0 -s 172.20.97.0/24 -j MASQUERADE"
# - "$IT4 -t nat -A POSTROUTING -o eth0 -s 172.20.98.0/24 -j MASQUERADE"
# - "$IT4 -t nat -A POSTROUTING -o eth0 -s 172.20.99.0/24 -j MASQUERADE"

# merge all variables matching prefix "firewall_xxx_*" (or override on per-host basis)
firewall_input:  "{{ vars | select('match', '^firewall_input_') | map('extract', vars) | flatten }}"
firewall_output:  "{{ vars | select('match', '^firewall_output_') | map('extract', vars) | flatten }}"
firewall_forward:  "{{ vars | select('match', '^firewall_forward_') | map('extract', vars) | flatten }}"
firewall_objects:  "{{ {} | combine(vars | select('match', '^firewall_objects_') | map('extract', vars) | list) }}"

# no need to change these
firewall_iptables: "$( which iptables )"
firewall6_iptables: "$( which ip6tables )"

# custom "log-drop" chains 
# XXX: don't remove default rules when overriding! most of these are used in templates/fw.sh
firewall_drop_rules:
  - INVALID
  - CHECKIF
  - CHECKIF_DHCP
  - CHECKIF_SPOOF
  - CHECKIF_POLICY
  - CHECKIF_DENY
  - HONEYPOT
  - DEFAULT
  - HACK
  - POLICY
  - ROGUE
  - BLACKLIST
  - RATELIMIT
  - IPV6

# custom "log-will-drop" chains
firewall_will_drop_rules:
  - DEFAULT
  - CHECKIF
  - CHECKIF_POLICY
  - CHECKIF_DENY
  - POLICY
  - INVALID
  - BLACKLIST
  - HACK


